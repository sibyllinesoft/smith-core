# NATS Server Configuration — Smith Core
# Client authentication is supplied by docker-compose command-line flags so the
# same file works for generated local creds and customer-managed overrides.
listen: 0.0.0.0:4222
http: 0.0.0.0:8222

jetstream {
    store_dir: /data
    max_mem: 256MB
    max_file: 1GB
}
